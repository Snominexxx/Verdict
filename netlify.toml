[build]
command = "npm run build"
publish = "build"
functions = ".netlify/functions"

[functions]
node_bundler = "esbuild"
external_node_modules = ["@supabase/supabase-js"]

[dev]
command = "npm run dev"

# Environment variables are set in Netlify Dashboard (Site settings → Environment variables)
# Do NOT hardcode secrets or project-specific values here.
